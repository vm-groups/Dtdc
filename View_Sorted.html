<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Selection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    padding:16px;
}

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #222;
    position:sticky;
    top:0;
    background:#000;
    z-index:1000;
    padding:0 10px;
}

.back-btn{
    width:40px;
    height:40px;
    border:1px solid #8b5cf6;
    border-radius:50%;
    background:#000;
    color:#fff;
    font-size:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.nav-title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:24px;
    white-space:nowrap;
    color:#fff;
}

.selection-row{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.pill-btn{
    background:#111;
    color:#fff;
    border:1px solid #8b5cf6;
    border-radius:30px;
    padding:10px 24px;
    font-size:20px;
    cursor:pointer;
    min-width:120px;
}

.pill-btn:hover{
    background:#8b5cf6;
}

.overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:2000;
    padding:25px;
}

.overlay-header{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:30px;
    color:#fff;
}

.options-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:40px;
}

.option-item{
    border:1px solid #333;
    background:#111;
    color:#fff;
    border-radius:18px;
    padding:14px;
    text-align:center;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.option-item.selected{
    background:#8b5cf6;
    border-color:#8b5cf6;
    color:#fff;
}

.overlay-footer{
    display:flex;
    justify-content:center;
}

.next-btn{
    width:140px;
    height:55px;
    border:1px solid #8b5cf6;
    border-radius:30px;
    background:#111;
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

.next-btn:hover{
    background:#673ab7;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#111;
}

::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <button class="back-btn" onclick="window.location.href='index.html'">&larr;</button>
    <div class="nav-title">Report of</div>
</div>

<div class="selection-row">
    <button class="pill-btn" id="monthBtn">Month</button>
    <button class="pill-btn" id="yearBtn">Year</button>
</div>

<!-- MONTH -->
<div class="overlay" id="monthOverlay">
    <div class="overlay-header">Select Month</div>
    <div class="options-grid" id="monthOptions"></div>
    <div class="overlay-footer">
        <button class="next-btn" id="monthNextBtn">Next</button>
    </div>
</div>

<!-- YEAR -->
<div class="overlay" id="yearOverlay">
    <div class="overlay-header">Select Year</div>
    <div class="options-grid" id="yearOptions"></div>
    <div class="overlay-footer">
        <button class="next-btn" id="yearNextBtn">Next</button>
    </div>
</div>

<script>
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const years = ["2024","2025","2026","2027","2028","2029","2030"];

let selectedMonth = "";
let selectedYear = "";
let reportType = "";

const monthBtn = document.getElementById("monthBtn");
const yearBtn = document.getElementById("yearBtn");

const monthOverlay = document.getElementById("monthOverlay");
const yearOverlay = document.getElementById("yearOverlay");

const monthOptions = document.getElementById("monthOptions");
const yearOptions = document.getElementById("yearOptions");

function renderMonths(){
    monthOptions.innerHTML = "";

    months.forEach((m, i) => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = m;

        div.onclick = () => {
            document.querySelectorAll("#monthOptions .option-item")
                .forEach(x => x.classList.remove("selected"));

            div.classList.add("selected");
            selectedMonth = String(i + 1).padStart(2,"0");
        };

        monthOptions.appendChild(div);
    });
}

function renderYears(){
    yearOptions.innerHTML = "";

    years.forEach(y => {
        const div = document.createElement("div");
        div.className = "option-item";
        div.textContent = y;

        div.onclick = () => {
            document.querySelectorAll("#yearOptions .option-item")
                .forEach(x => x.classList.remove("selected"));

            div.classList.add("selected");
            selectedYear = y;
        };

        yearOptions.appendChild(div);
    });
}

renderMonths();
renderYears();

monthBtn.onclick = () => {
    reportType = "month";
    selectedMonth = "";
    selectedYear = "";

    monthOverlay.style.display = "block";
};

yearBtn.onclick = () => {
    reportType = "year";
    selectedYear = "";
    yearOverlay.style.display = "block";
};

document.getElementById("monthNextBtn").onclick = () => {
    if(!selectedMonth){
        alert("Please select a month");
        return;
    }
    monthOverlay.style.display = "none";
    yearOverlay.style.display = "block";
};

document.getElementById("yearNextBtn").onclick = () => {
    if(!selectedYear){
        alert("Please select a year");
        return;
    }

    let report;

    if(reportType === "month"){
        report = `${selectedMonth}/${selectedYear}`;
    } else {
        report = `${selectedYear}`;
    }

    localStorage.setItem("report", report);
    localStorage.setItem("reportType", reportType);

    window.location.href = "review.html";
};
</script>

</body>
</html>
