<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.navbar{
height:55px;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border-bottom:1px solid #ddd;
font-weight:bold;
font-size:20px;
position:sticky;
top:0;
}

.container{
padding:15px;
}

.summary{
background:#fff;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.sum-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

.total{
font-size:20px;
font-weight:bold;
border-top:1px solid #ddd;
margin-top:10px;
padding-top:10px;
}

.noData{
text-align:center;
padding:40px;
color:#777;
}
</style>
</head>

<body>

<div class="navbar">Report</div>

<div class="container">

<div class="summary">
<h3 id="title">Report</h3>

<div class="sum-row">
<span>UPI</span>
<span id="upi">₹0</span>
</div>

<div class="sum-row">
<span>Cash</span>
<span id="cash">₹0</span>
</div>

<div class="sum-row">
<span>Credit</span>
<span id="credit">₹0</span>
</div>

<div class="sum-row">
<span>Total Income</span>
<span id="income">₹0</span>
</div>

<div class="sum-row">
<span>Total Expense</span>
<span id="expense">₹0</span>
</div>

<div class="sum-row total">
<span>Profit</span>
<span id="profit">₹0</span>
</div>

</div>

<div id="list"></div>

</div>

<script>
const incomes = JSON.parse(localStorage.getItem("incomes") || "{}");
const expenses = JSON.parse(localStorage.getItem("expenses") || "{}");

let totalUPI = 0;
let totalCash = 0;
let totalCredit = 0;
let totalIncome = 0;
let totalExpense = 0;

const list = document.getElementById("list");

function addRow(date, name, type, amount){

const div = document.createElement("div");

div.style.background = "#fff";
div.style.marginBottom = "10px";
div.style.padding = "10px";
div.style.borderRadius = "10px";

div.innerHTML = `
<b>${date}</b><br>
${name} - ${type} - ₹${amount}
`;

list.appendChild(div);
}

// INCOME LOOP
for(const date in incomes){

const entries = incomes[date];

entries.forEach(item => {

const amount = Number(item.amount || 0);
const method = (item.method || "").toUpperCase();

totalIncome += amount;

if(method === "UPI") totalUPI += amount;
else if(method === "CASH") totalCash += amount;
else if(method === "CREDIT") totalCredit += amount;

addRow(date, item.note || "Income", method, amount);

});

}

// EXPENSE LOOP
for(const date in expenses){

const entries = expenses[date];

entries.forEach(item => {

const amount = Number(item.amount || 0);

totalExpense += amount;

addRow(date, item.note || "Expense", "EXPENSE", amount);

});

}

// UI UPDATE
document.getElementById("upi").innerText = "₹" + totalUPI;
document.getElementById("cash").innerText = "₹" + totalCash;
document.getElementById("credit").innerText = "₹" + totalCredit;
document.getElementById("income").innerText = "₹" + totalIncome;
document.getElementById("expense").innerText = "₹" + totalExpense;

document.getElementById("profit").innerText =
"₹" + (totalIncome - totalExpense);

if(totalIncome === 0 && totalExpense === 0){
document.getElementById("list").innerHTML =
"<div class='noData'>No Records Found</div>";
}
</script>

</body>
</html>
