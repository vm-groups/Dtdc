<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

.navbar{
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #222;
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.back-btn{
position:absolute;
left:10px;
width:40px;
height:40px;
border:1px solid #8b5cf6;
border-radius:50%;
background:#000;
color:#fff;
font-size:22px;
cursor:pointer;
}

.nav-title{
font-size:22px;
font-weight:bold;
color:#fff;
}

.container{
padding:15px;
}

.summary{
border:1px solid #222;
padding:15px;
border-radius:16px;
margin-bottom:20px;
background:#111;
}

.sum-row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #1f1f1f;
}

.sum-row:last-child{
border-bottom:none;
}

.total{
border-top:1px solid #333;
margin-top:10px;
padding-top:12px;
font-size:18px;
font-weight:bold;
color:#8b5cf6;
}

.row-card{
border:1px solid #222;
border-radius:16px;
padding:14px;
margin-bottom:12px;
background:#111;
}

.entry-date{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
color:#aaa;
}

.entry-line{
display:flex;
justify-content:space-between;
align-items:center;
}

.amount{
font-size:16px;
font-weight:bold;
color:#fff;
}

small{
color:#888;
}

.noData{
text-align:center;
padding:50px;
color:#888;
font-size:18px;
}

</style>
</head>

<body>

<div class="navbar">

<button class="back-btn"
onclick="window.location.href='View_Sorted.html'">
←
</button>

<div class="nav-title">
Report
</div>

</div>

<div class="container">

<div class="summary">

<div class="sum-row">
<span>Cash</span>
<span id="cash">₹0</span>
</div>

<div class="sum-row">
<span>UPI</span>
<span id="upi">₹0</span>
</div>
<div class="sum-row">
<span>Credit</span>
<span id="credit">₹0</span>
</div>

<div class="sum-row">
<span>Total Income</span>
<span id="income">₹0</span>
</div>

<div class="sum-row">
<span>Total Expense</span>
<span id="expense">₹0</span>
</div>

<div class="sum-row total">
<span>Profit</span>
<span id="profit">₹0</span>
</div>

</div>

<div id="list"></div>

</div>

<script>

const incomes =
JSON.parse(
localStorage.getItem("incomes")
|| "{}"
);

const expenses =
JSON.parse(
localStorage.getItem("expenses")
|| "{}"
);

let totalCash = 0;
let totalUPI = 0;
let totalCredit = 0;
let totalIncome = 0;
let totalExpense = 0;

const allRows = [];

function addEntry(
date,
name,
type,
amount
){

allRows.push({
date,
name,
type,
amount
});

}

for(const date in incomes){

incomes[date].forEach(item=>{

const amount =
Number(item.amount || 0);

const method =
(item.method || "")
.toUpperCase();

totalIncome += amount;

if(method==="CASH"){
totalCash += amount;
}

if(method==="UPI"){
totalUPI += amount;
}

if(method==="CREDIT"){
totalCredit += amount;
}

addEntry(
date,
item.note ||
method ||
"Income",
method,
amount
);

});

}
for(const date in expenses){

expenses[date].forEach(item=>{

const amount =
Number(item.amount || 0);

totalExpense += amount;

addEntry(
date,
item.note ||
"Expense",
"EXPENSE",
amount
);

});

}

allRows.sort((a,b)=>{

return new Date(b.date)
-
new Date(a.date);

});

const list =
document.getElementById(
"list"
);

allRows.forEach(item=>{

const div =
document.createElement("div");

div.className =
"row-card";

const sign =
item.type==="EXPENSE"
? "-"
: "+";

div.innerHTML = `

<div class="entry-date">
${item.date}
</div>

<div class="entry-line">

<div>
${item.name}
<br>
<small>
${item.type}
</small>
</div>

<div class="amount">
${sign} ₹${item.amount}
</div>

</div>

`;

list.appendChild(div);

});

document.getElementById(
"cash"
).innerText =
"₹" + totalCash;

document.getElementById(
"upi"
).innerText =
"₹" + totalUPI;

document.getElementById(
"credit"
).innerText =
"₹" + totalCredit;
document.getElementById(
"income"
).innerText =
"₹" + totalIncome;

document.getElementById(
"expense"
).innerText =
"₹" + totalExpense;

const profit =
totalIncome -
totalExpense;

document.getElementById(
"profit"
).innerText =
(profit < 0
? "-₹" + Math.abs(profit)
: "₹" + profit);

if(allRows.length===0){

list.innerHTML =

"<div class='noData'>No Records Found</div>";

}

</script>

</body>
</html>
