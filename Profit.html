<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
}

.navbar{
height:55px;
border-bottom:1px solid #000;
display:flex;
align-items:center;
position:relative;
padding:0 12px;
}

.back-btn{
width:40px;
height:40px;
border:1px solid #000;
border-radius:50%;
background:none;
font-size:22px;
cursor:pointer;
}

.nav-title{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:22px;
}

.container{
padding:15px;
}

.month-box{
display:flex;
gap:8px;
margin-top:15px;
margin-bottom:20px;
}

.month-box select{
flex:1;
height:45px;
border:1px solid #000;
border-radius:25px;
padding:0 15px;
background:#fff;
}

.month-box button{
height:45px;
padding:0 18px;
border:1px solid #000;
border-radius:25px;
background:none;
cursor:pointer;
}

.entry-table{
width:100%;
border-collapse:collapse;
}

.entry-table tr{
border-bottom:1px solid #ddd;
}

.entry-table td{
padding:12px 0;
}

.main-text{
font-size:18px;
}

.sub-text{
font-size:13px;
margin-top:3px;
}

.amount{
text-align:right;
white-space:nowrap;
font-size:18px;
}

#noData{
display:none;
text-align:center;
padding:25px;
font-size:18px;
}

.summary{
display:none;
margin-top:20px;
border:1px solid #000;
padding:15px;
}

.summary-title{
text-align:center;
font-size:20px;
margin-bottom:15px;
}

.summary-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

.profit-row{
display:flex;
justify-content:space-between;
border-top:1px solid #000;
margin-top:10px;
padding-top:10px;
font-size:20px;
}

#addBillBtn{
display:none;
width:90%;
height:50px;
margin:20px auto;
border:1px solid #000;
border-radius:25px;
background:none;
font-size:18px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="navbar">
<button class="back-btn" onclick="history.back()">←</button>
<div class="nav-title">Profit</div>
</div>

<div class="container">

<div class="month-box">

<select id="monthSelect">
<option value="01">Jan</option>
<option value="02">Feb</option>
<option value="03">Mar</option>
<option value="04">Apr</option>
<option value="05">May</option>
<option value="06">Jun</option>
<option value="07">Jul</option>
<option value="08">Aug</option>
<option value="09">Sep</option>
<option value="10">Oct</option>
<option value="11">Nov</option>
<option value="12">Dec</option>
</select>

<select id="yearSelect"></select>

<button id="loadBtn">Search</button>

</div>

<table class="entry-table" id="entryTable"></table>

<div id="noData">
No Entries Found
</div>

<div class="summary" id="summaryBox">

<div class="summary-title">
Summary
</div>

<div class="summary-row">
<span>Cash</span>
<span id="cashTotal">₹0</span>
</div>

<div class="summary-row">
<span>UPI</span>
<span id="upiTotal">₹0</span>
</div>
<div class="summary-row">
<span>Credit</span>
<span id="creditTotal">₹0</span>
</div>

<div class="summary-row">
<span>Expenses</span>
<span id="expenseTotal">₹0</span>
</div>

<div class="summary-row">
<span>Bills</span>
<span id="billTotal">₹0</span>
</div>

<div class="profit-row">
<span>Profit</span>
<span id="profitTotal">₹0</span>
</div>

</div>

<button id="addBillBtn">
Add Bill
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getDatabase,
ref,
get,
push,
set
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyC2DkTGi6VnGxBU5vcmhdvSpeWZskVknqc",
authDomain:"site-2a9d6.firebaseapp.com",
databaseURL:"https://site-2a9d6-default-rtdb.firebaseio.com",
projectId:"site-2a9d6",
storageBucket:"site-2a9d6.firebasestorage.app",
messagingSenderId:"1060812483121",
appId:"1:1060812483121:web:d2b173d180071145810310"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("entryTable");

const monthSelect =
document.getElementById("monthSelect");

const yearSelect =
document.getElementById("yearSelect");

const now = new Date();
const currentMonth =
String(now.getMonth()+1).padStart(2,"0");
const currentYear =
now.getFullYear();

for(let y=2020;y<=currentYear+20;y++){

yearSelect.innerHTML +=
`<option value="${y}">${y}</option>`;

}

monthSelect.value=currentMonth;
yearSelect.value=currentYear;

let cashTotal=0;
let upiTotal=0;
let creditTotal=0;
let expenseTotal=0;
let billTotal=0;
document.getElementById("addBillBtn").onclick =
async ()=>{

const month = monthSelect.value;
const year = yearSelect.value;

const amt = prompt("Enter Bill Amount");

if(!amt || isNaN(amt)) return;

const billRef =
push(ref(db,`bills/${year}-${month}`));

await set(billRef,{
amount:Number(amt)
});

alert("Bill Saved");

};

document.getElementById("loadBtn").onclick =
async ()=>{

document.getElementById("summaryBox").style.display="none";
document.getElementById("noData").style.display="none";
document.getElementById("addBillBtn").style.display="none";

table.innerHTML="";

cashTotal=0;
upiTotal=0;
creditTotal=0;
expenseTotal=0;
billTotal=0;

const month = monthSelect.value;
const year = yearSelect.value;

let rows=[];

const incomeSnap =
await get(ref(db,"incomes"));

const expenseSnap =
await get(ref(db,"expenses"));

const billSnap =
await get(ref(db,`bills/${year}-${month}`));

if(incomeSnap.exists()){

incomeSnap.forEach(dateNode=>{

const date=dateNode.key;

if(date.startsWith(`${year}-${month}`)){

dateNode.forEach(item=>{

const d=item.val();

rows.push({
date,
title:d.method || "Income",
type:d.method || "Income",
amount:Number(d.amount)
});

if(d.method==="Cash")
cashTotal += Number(d.amount);

else if(d.method==="UPI")
upiTotal += Number(d.amount);

else if(d.method==="Credit")
creditTotal += Number(d.amount);

});

}

});

}
if(expenseSnap.exists()){

expenseSnap.forEach(dateNode=>{

const date=dateNode.key;

if(date.startsWith(`${year}-${month}`)){

dateNode.forEach(item=>{

const d=item.val();

rows.push({
date,
title:d.note || "Expense",
type:"Expense",
amount:Number(d.amount)
});

expenseTotal += Number(d.amount);

});

}

});

}

if(billSnap.exists()){

billSnap.forEach(item=>{

const d=item.val();

rows.push({
date:`${year}-${month}`,
title:"Bill",
type:"Bill",
amount:Number(d.amount)
});

billTotal += Number(d.amount);

});

}

rows.sort((a,b)=>
new Date(b.date)-new Date(a.date)
);

if(rows.length===0){

document.getElementById("noData").style.display="block";
return;

}

rows.forEach(r=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>
<div class="main-text">${r.title}</div>
<div class="sub-text">${r.type} • ${r.date}</div>
</td>

<td class="amount">
${r.type==="Expense" || r.type==="Bill" ? "-" : "+"}
₹${r.amount}
</td>
`;

table.appendChild(tr);

});

document.getElementById("cashTotal").innerText =
"₹"+cashTotal;

document.getElementById("upiTotal").innerText =
"₹"+upiTotal;

document.getElementById("creditTotal").innerText =
"₹"+creditTotal;

document.getElementById("expenseTotal").innerText =
"₹"+expenseTotal;

document.getElementById("billTotal").innerText =
"₹"+billTotal;

document.getElementById("profitTotal").innerText =
"₹"+(
cashTotal +
upiTotal +
creditTotal -
expenseTotal -
billTotal
);

document.getElementById("summaryBox").style.display="block";
document.getElementById("addBillBtn").style.display="block";

};

</script>

</body>
</html>
