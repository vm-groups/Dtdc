<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Expense</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

/* NAVBAR */

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#673ab7;
    position:sticky;
    top:0;
    z-index:1000;
    padding:0 10px;
}

.back-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#673ab7;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.nav-title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    font-weight:bold;
    color:#fff;
}

/* CONTENT */

.container{
    padding:25px;
}

.heading{
    text-align:center;
    font-size:42px;
    margin-bottom:35px;
    color:#fff;
}

.label{
    font-size:22px;
    margin-bottom:10px;
    color:#fff;
}

.input{
    width:100%;
    height:55px;
    border:2px solid #673ab7;
    border-radius:30px;
    padding:0 20px;
    font-size:18px;
    outline:none;
    margin-bottom:30px;
    background:#111;
    color:#fff;
}

.input::placeholder{
    color:#aaa;
}

/* SAVE BUTTON */

.save-wrap{
    display:flex;
    justify-content:center;
}

.save-btn{
    width:90%;
    height:55px;
    border:none;
    border-radius:30px;
    background:green;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

/* OVERLAY */

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    display:none;
    align-items:center;
    justify-content:center;
}

/* POPUP */

.popup{
    background:#111;
    border:2px solid #673ab7;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:280px;
    color:#fff;
}

.popup h2{
    color:#fff;
}

/* OK BUTTON */

.popup button{
    margin-top:15px;
    width:120px;
    height:45px;
    border:none;
    border-radius:25px;
    background:#673ab7;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="nav-title">Add Expense</div>
</div>

<div class="container">

    <div class="heading">Add Expense</div>

    <div class="label">Amount</div>
    <input class="input" type="number" id="amount">

    <div class="label">Date</div>
    <input class="input" type="date" id="date">

    <div class="label">Note</div>
    <input class="input" type="text" id="note">

    <div class="save-wrap">
        <button class="save-btn" id="saveBtn">Save</button>
    </div>

</div>

<!-- overlay -->
<div id="overlay">
  <div class="popup">
    <h2>Saved Successfully</h2>
    <button onclick="closeOverlay()" style="
      margin-top:15px;
      padding:10px 20px;
      border:1px solid #000;
      background:none;
      border-radius:20px;
      cursor:pointer;
    ">OK</button>
  </div>
</div>

<script>
const saveBtn = document.getElementById("saveBtn");

saveBtn.addEventListener("click", () => {
    const amount = document.getElementById("amount").value;
    const date = document.getElementById("date").value;
    const note = document.getElementById("note").value;

    if (!amount || !date) {
        alert("Amount and Date required");
        return;
    }

    // GET EXISTING EXPENSES
    let expenses = JSON.parse(localStorage.getItem("expenses")) || {};

    // CREATE DATE ARRAY IF NOT EXISTS
    if (!expenses[date]) {
        expenses[date] = [];
    }

    // ADD ENTRY
    expenses[date].push({
        amount: Number(amount),
        note: note,
        
    });

    // SAVE BACK
    localStorage.setItem("expenses", JSON.stringify(expenses));

    // UI RESET
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";
});

function closeOverlay() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
