<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Pay</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fff;
}

.navbar{
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #e5e5e5;
    font-size:20px;
    font-weight:bold;

    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1000;
}

.container{
    padding:15px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.search-box input{
    flex:1;
    height:45px;
    border:1px solid #ccc;
    border-radius:25px;
    padding:0 15px;
    outline:none;
}

.search-btn{
    width:50px;
    border:none;
    background:none;
    font-size:20px;
    cursor:pointer;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    margin-top:35px;
}

.menu-btn{
    border:none;
    background:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
}

.menu-btn i{
    font-size:28px;
}

.menu-btn span{
    font-size:13px;
}

.summary{
    text-align:center;
    margin-top:30px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.left{
    display:flex;
    flex-direction:column;
}

.title{
    font-size:16px;
}

.mode{
    font-size:12px;
    color:#666;
}

.amount{
    font-size:16px;
    font-weight:bold;
}

.fixed-total{
    text-align:center;
    font-size:38px;
    font-weight:bold;
    margin:10px 0 20px;
}

.no-data{
    text-align:center;
    padding:40px;
    color:#777;
}

.summary-box{
    margin-top:25px;
    border-top:1px solid #ddd;
    padding-top:15px;
}

.summary-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
}

.grand-row{
    display:flex;
    justify-content:space-between;
    padding-top:10px;
    margin-top:10px;
    border-top:1px solid #ddd;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="navbar">VM Pay</div>

<div class="container">

<div class="search-box">
    <input type="date" id="dateInput">
    <button class="search-btn" onclick="saveDate()">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
</div>

<div class="menu-grid">

    <button class="menu-btn"onclick="window.location.href='add_entries.html'">
        <i class="fa-solid fa-plus"></i>
        <span>Add Entry</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='Credit_list.html'">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <span>Credit List</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='View_Sorted.html'">
        <i class="fa-solid fa-chart-column"></i>
        <span>View Report</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='Profit.html'">
        <i class="fa-solid fa-indian-rupee-sign"></i>
        <span>Profit</span>
    </button>

</div>

<div class="summary">
    <span id="todayDate">--</span>
</div>

<div class="fixed-total" id="grandTotal">₹0</div>

<div id="content"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2DkTGi6VnGxBU5vcmhdvSpeWZskVknqc",
  authDomain: "site-2a9d6.firebaseapp.com",
  databaseURL: "https://site-2a9d6-default-rtdb.firebaseio.com",
  projectId: "site-2a9d6",
  storageBucket: "site-2a9d6.firebasestorage.app",
  messagingSenderId: "1060812483121",
  appId: "1:1060812483121:web:d2b173d180071145810310"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const today = new Date().toISOString().split("T")[0];
document.getElementById("todayDate").innerText = today;

const content = document.getElementById("content");

let totalEntries = 0;

let cashTotal = 0;
let upiTotal = 0;
let creditTotal = 0;
let expenseTotal = 0;
let incomeTotal = 0;
function resetTotals(){
    cashTotal = 0;
    upiTotal = 0;
    creditTotal = 0;
    expenseTotal = 0;
    incomeTotal = 0;
    totalEntries = 0;
    content.innerHTML = "";
}

function addRow(data, type){

    if(!data || !data.amount) return;

    const amount = Number(data.amount);
    if(isNaN(amount)) return;

    totalEntries++;

    const row = document.createElement("div");
    row.className = "row";

    const sign = type === "income" ? "+" : "-";
    const modeText = type === "income" ? "Income" : "Expense";

    const title = type === "income"
        ? (data.method || "Income")
        : (data.note || "Expense");

    row.innerHTML = `
        <div class="left">
            <div class="title">${title}</div>
            <div class="mode">${modeText}</div>
        </div>

        <div class="amount">
            ${sign} ₹${amount}
        </div>
    `;

    content.appendChild(row);

    if(type === "income"){
        incomeTotal += amount;

        if(data.method === "Cash") cashTotal += amount;
        else if(data.method === "UPI") upiTotal += amount;
        else if(data.method === "Credit") creditTotal += amount;

    } else {
        expenseTotal += amount;
    }

    updateSummary();
}

// INCOME
const incomeRef = ref(db, "incomes/" + today);

onValue(incomeRef, (snapshot) => {

    resetTotals();

    snapshot.forEach((child) => {
        addRow(child.val(), "income");
    });

    updateSummary();
});

// EXPENSE
const expenseRef = ref(db, "expenses/" + today);

onValue(expenseRef, (snapshot) => {

    snapshot.forEach((child) => {
        addRow(child.val(), "expense");
    });

    updateSummary();
});
function updateSummary(){

    const profit = incomeTotal - expenseTotal;

    document.getElementById("grandTotal").innerText = "+ ₹" + profit;
}

window.saveDate = function(){

    const date = document.getElementById("dateInput").value;

    if(!date){
        alert("Select a date");
        return;
    }

    localStorage.setItem("date", date);
    window.location.href = "Search.html";
}

</script>

</body>
</html>
