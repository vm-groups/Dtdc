<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Pay</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fff;
}

.navbar{
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #e5e5e5;
    font-size:20px;
    font-weight:bold;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1000;
}

.container{
    padding:15px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.search-box input{
    flex:1;
    height:45px;
    border:1px solid #ccc;
    border-radius:25px;
    padding:0 15px;
    outline:none;
}

.search-btn{
    width:50px;
    border:none;
    background:none;
    font-size:20px;
    cursor:pointer;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:35px;
}

.menu-btn{
    border:none;
    background:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
}

.menu-btn i{
    font-size:28px;
}

.menu-btn span{
    font-size:13px;
}

.summary{
    text-align:center;
    margin-top:30px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.left{
    display:flex;
    flex-direction:column;
}

.title{
    font-size:16px;
}

.mode{
    font-size:12px;
    color:#666;
}

.amount{
    font-size:16px;
    font-weight:bold;
}

.fixed-total{
    text-align:center;
    font-size:38px;
    font-weight:bold;
    margin:10px 0 20px;
}

.no-data{
    text-align:center;
    padding:40px;
    color:#777;
}

</style>
</head>

<body>

<div class="navbar">VM Pay</div>

<div class="container">

<div class="search-box">
    <input type="date" id="dateInput">
    <button class="search-btn" onclick="saveDate()">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
</div>

<div class="menu-grid">

    <button class="menu-btn" onclick="window.location.href='add_entries.html'">
        <i class="fa-solid fa-plus"></i>
        <span>Add Entry</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='Credit_list.html'">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <span>Credit List</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='View_Sorted.html'">
        <i class="fa-solid fa-chart-column"></i>
        <span>View Report</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='Profit.html'">
        <i class="fa-solid fa-indian-rupee-sign"></i>
        <span>Profit</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='all_entries.html'">
        <i class="fa-solid fa-list"></i>
        <span>All Entries</span>
    </button>

    <button class="menu-btn" onclick="window.location.href='Expence_review.html'">
        <i class="fa-solid fa-wallet"></i>
        <span>Expenses</span>
    </button>

</div>

<div class="summary">
    <span id="todayDate">--</span>
</div>

<div class="fixed-total" id="grandTotal">₹0</div>

<div id="content"></div>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("todayDate").innerText = today;

const content = document.getElementById("content");

let incomeTotal = 0;
let expenseTotal = 0;

function reset(){
    incomeTotal = 0;
    expenseTotal = 0;
    content.innerHTML = "";
}

function getData(key){
    return JSON.parse(localStorage.getItem(key)) || {};
}

function addRow(data, type){

    if(!data || !data.amount) return;

    const amount = Number(data.amount);
    if(isNaN(amount)) return;

    const row = document.createElement("div");
    row.className = "row";

    const sign = type === "income" ? "+" : "-";
    const modeText = type === "income" ? "Income" : "Expense";

    const title = type === "income"
        ? (data.method || "Income")
        : (data.note || "Expense");

    row.innerHTML = `
        <div class="left">
            <div class="title">${title}</div>
            <div class="mode">${modeText}</div>
        </div>

        <div class="amount">
            ${sign} ₹${amount}
        </div>
    `;

    content.appendChild(row);

    if(type === "income"){
        incomeTotal += amount;
    } else {
        expenseTotal += amount;
    }
}

function loadToday(){

    reset();

    const incomes = getData("incomes");
    const expenses = getData("expenses");

    const incomeList = incomes[today] || [];
    const expenseList = expenses[today] || [];

    incomeList.forEach(i => addRow(i, "income"));
    expenseList.forEach(e => addRow(e, "expense"));

    const profit = incomeTotal - expenseTotal;
    document.getElementById("grandTotal").innerText = "+ ₹" + profit;
}

loadToday();

window.saveDate = function(){

    const date = document.getElementById("dateInput").value;

    if(!date){
        alert("Select a date");
        return;
    }

    localStorage.setItem("date", date);
    window.location.href = "Search.html";
};
</script>

</body>
</html>
