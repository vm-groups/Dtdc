<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger View</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #fff;
    color: #000;
    padding: 16px;
}

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #e5e5e5;
    font-size:20px;
    font-weight:bold;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1000;
    padding: 0 10px;
}

.back-btn {
    width: 40px;
    height: 40px;
    border: 1px solid #000;
    border-radius: 50%;
    background: none;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.content-container {
    width: 100%;
}

.date-section {
    text-align: center;
    font-size: 22px;
    margin-bottom: 25px;
}

.date-box {
    border: 1px solid #000;
    display: inline-block;
    padding: 4px 24px;
    border-radius: 30px;
    margin-left: 5px;
}

.entry-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 25px;
}

.entry-table tr {
    border-bottom: 1px solid #000;
}

.entry-table td {
    padding: 12px 0;
}

.label-main {
    font-size: 22px;
    display: block;
}

.label-sub {
    font-size: 14px;
    display: block;
    margin-top: 2px;
}

.amount {
    text-align: right;
    font-size: 22px;
    white-space: nowrap;
}

.summary-box {
    border: 1px solid #000;
    padding: 16px;
    margin-bottom: 20px;
}

.summary-title {
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 20px;
}

.total-row {
    display: flex;
    justify-content: space-between;
    font-size: 22px;
    padding-top: 10px;
}
</style>
</head>

<body>

<div class="navbar">
    <button class="back-btn" onclick="window.location.href='index.html'">&larr;</button>
</div>

<div class="content-container">

    <div class="date-section">
        Date <div class="date-box" id="dateBox">--</div>
    </div>

    <table class="entry-table" id="entryTable"></table>

    <div class="summary-box">
        <div class="summary-title">Summary</div>

        <div class="summary-row">
            <span>Cash</span>
            <span id="cashTotal">0</span>
        </div>

        <div class="summary-row">
            <span>UPI</span>
            <span id="upiTotal">0</span>
        </div>

        <div class="summary-row">
            <span>Credit (Pending)</span>
            <span id="creditTotal">0</span>
        </div>

        <div class="summary-row">
            <span>Expenses</span>
            <span id="expenseTotal">0</span>
        </div>

    </div>

    <div class="total-row">
        <span>Grand Total</span>
        <span id="grandTotal">0</span>
    </div>

</div>

<script>
const date =
localStorage.getItem("date") ||
new Date().toISOString().split("T")[0];

document.getElementById("dateBox").innerText = date;

const table = document.getElementById("entryTable");

// LOAD DATA
const incomes =
JSON.parse(localStorage.getItem("incomes") || "{}");

const expenses =
JSON.parse(localStorage.getItem("expenses") || "{}");

// TOTALS
let cashTotal = 0;
let upiTotal = 0;
let creditTotal = 0;
let expenseTotal = 0;
let incomeTotal = 0;

function addRow(name, type, amount){

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>
            <span class="label-main">${name}</span>
            <span class="label-sub">${type}</span>
        </td>
        <td class="amount">
            ${type === "Expense" ? "- " : "+ "}₹${amount}
        </td>
    `;

    table.appendChild(row);

    // income breakdown
    if(type === "Cash") cashTotal += amount;
    else if(type === "UPI") upiTotal += amount;
    else if(type === "Credit") creditTotal += amount;

    if(type === "Expense") expenseTotal += amount;
    else incomeTotal += amount;
}

// INCOMES
if(incomes[date]){
    incomes[date].forEach(d => {
        addRow(
            d.method || "Income",
            d.method || "Income",
            Number(d.amount)
        );
    });
}

// EXPENSES
if(expenses[date]){
    expenses[date].forEach(d => {
        addRow(
            d.note || "Expense",
            "Expense",
            Number(d.amount)
        );
    });
}

// UPDATE UI
document.getElementById("cashTotal").innerText = cashTotal;
document.getElementById("upiTotal").innerText = upiTotal;
document.getElementById("creditTotal").innerText = creditTotal;
document.getElementById("expenseTotal").innerText = expenseTotal;

document.getElementById("grandTotal").innerText =
incomeTotal - expenseTotal;
</script>

</body>
</html>
