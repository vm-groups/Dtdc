<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    padding:16px;
    background:#000;
    color:#fff;
}

/* NAVBAR */

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#673ab7;
    position:sticky;
    top:0;
    z-index:1000;
    padding:0 10px;
    margin:-16px -16px 20px -16px;
}

.back-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#673ab7;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
    font-weight:bold;
    color:#fff;
}

/* CREDIT CARD */

.card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-bottom:15px;
    background:#111;
    border:2px solid #673ab7;
    border-radius:16px;
}

.left{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.name{
    font-size:18px;
    color:#fff;
}

.meta{
    font-size:13px;
    color:#bdbdbd;
}

.amount{
    font-size:18px;
    font-weight:bold;
    color:#00e676;
}

/* BUTTON GROUP */

.btns{
    display:flex;
    gap:8px;
    margin-top:8px;
}

/* EDIT BUTTON */

.icon-btn{
    width:36px;
    height:36px;
    border:none;
    border-radius:10px;
    background:#673ab7;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.icon-btn i{
    font-size:14px;
}

/* DELETE BUTTON */

.delete-btn{
    background:#e53935 !important;
}

/* EMPTY */

.empty{
    text-align:center;
    margin-top:50px;
    color:#bdbdbd;
    font-size:18px;
}

/* POPUP */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

.box{
    background:#111;
    padding:20px;
    width:90%;
    max-width:320px;
    border-radius:15px;
    border:2px solid #673ab7;
}

.box h3,
.box p{
    color:#fff;
}

/* INPUTS */

.box input,
.box select{
    width:100%;
    height:48px;
    padding:0 12px;
    margin-bottom:10px;
    border:2px solid #673ab7;
    border-radius:10px;
    background:#000;
    color:#fff;
    outline:none;
}

/* EDIT SAVE BUTTON */

#popup .box button{
    width:100%;
    height:48px;
    border:none;
    border-radius:24px;
    background:#673ab7;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* DELETE POPUP BUTTONS */

#deletePopup .box button{
    width:100%;
    height:48px;
    border-radius:24px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* YES */

#deletePopup .box button:first-of-type{
    background:#e53935;
    color:#fff;
    border:none;
}

/* NO */

#deletePopup .box button:last-of-type{
    background:transparent;
    color:#fff;
    border:2px solid #673ab7;
}

</style>
</head>

<body>

<div class="navbar">

<button class="back-btn"
onclick="window.location.href='index.html'">
←
</button>

<div class="title">
Credits
</div>

</div>

<div id="list"></div>

<div id="empty"
class="empty"
style="display:none;">
No credits pending
</div>
<!-- EDIT POPUP -->

<div class="popup" id="popup">

<div class="box">

<input
id="amt"
type="number"
placeholder="Amount">

<select id="mode">
<option value="Cash">Cash</option>
<option value="UPI">UPI</option>
<option value="Credit">Credit</option>
</select>

<input
id="note"
type="text"
placeholder="Note">

<button style="background-color: green;" onclick="saveEdit()">
Save
</button>

</div>

</div>

<!-- DELETE POPUP -->

<div class="popup" id="deletePopup">

<div class="box">

<h3 style="text-align:center;">
Delete Credit?
</h3>

<p style="
text-align:center;
margin-top:10px;
">
Are you sure you want to delete this credit?
</p>

<button onclick="confirmDelete()">
Yes
</button>

<button onclick="closeDeletePopup()">
No
</button>

</div>

</div>

<script>

function getData(key){

return JSON.parse(
localStorage.getItem(key)
) || {};

}

function saveData(key,data){

localStorage.setItem(
key,
JSON.stringify(data)
);

}

let editData = null;
let deleteData = null;

function loadCredits(){

const list =
document.getElementById("list");

const empty =
document.getElementById("empty");

list.innerHTML = "";

const incomes =
getData("incomes");

let credits = [];

for(const date in incomes){

incomes[date].forEach(item=>{

if(item.method==="Credit"){

credits.push({
...item,
date
});

}

});

}
if(credits.length===0){

empty.style.display =
"block";

return;

}else{

empty.style.display =
"none";

}

credits.sort((a,b)=>
new Date(a.date) -
new Date(b.date)
);

credits.forEach(item=>{

const div =
document.createElement("div");

div.className =
"card";

div.innerHTML = `

<div class="left">

<div class="name">
${item.note || "Credit"}
</div>

<div class="meta">
${item.date}
</div>

</div>

<div>

<div class="amount">
₹${item.amount}
</div>

<div class="btns">

<button
class="icon-btn edit-btn">

<i class="fa-solid fa-pen"></i>

</button>

<button
class="icon-btn delete-btn">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</div>

`;

div.querySelector(
".edit-btn"
).onclick = ()=>{

editItem(
item.date,
item.amount,
item.method,
item.note
);

};

div.querySelector(
".delete-btn"
).onclick = ()=>{

deleteItem(
item.date,
item
);

};

list.appendChild(div);

});

}

function deleteItem(
date,
item
){

deleteData = {
date,
item
};

document.getElementById(
"deletePopup"
).style.display =
"flex";

}

function closeDeletePopup(){

document.getElementById(
"deletePopup"
).style.display =
"none";

}
function confirmDelete(){

let incomes =
getData("incomes");

const date =
deleteData.date;

const item =
deleteData.item;

incomes[date] =
incomes[date].filter(i=>

!(

i.amount === item.amount &&

i.note === item.note &&

i.method === item.method

)

);

if(
incomes[date].length === 0
){

delete incomes[date];

}

saveData(
"incomes",
incomes
);

closeDeletePopup();

loadCredits();

}

function editItem(
date,
amount,
method,
note
){

editData = {
date,
amount,
method,
note
};

document.getElementById(
"amt"
).value = amount;

document.getElementById(
"mode"
).value = method;

document.getElementById(
"note"
).value =
note || "";

document.getElementById(
"popup"
).style.display =
"flex";

}

function saveEdit(){

const incomes =
getData("incomes");

const amount =
Number(
document.getElementById(
"amt"
).value
);

const mode =
document.getElementById(
"mode"
).value;

const note =
document.getElementById(
"note"
).value;

for(const date in incomes){

incomes[date].forEach(i=>{

if(

i.amount === editData.amount &&

i.method === editData.method &&

i.note === editData.note

){

i.amount = amount;
i.method = mode;
i.note = note;

}

});

}

saveData(
"incomes",
incomes
);

document.getElementById(
"popup"
).style.display =
"none";

loadCredits();

}

loadCredits();

</script>

</body>
</html>
