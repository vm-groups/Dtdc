<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    padding:16px;
    background:#fff;
}

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;

    border-bottom:1px solid #e5e5e5;
    font-size:20px;
    font-weight:bold;

    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1000;

    padding: 0 10px;
}

.back-btn{
    width:40px;
    height:40px;
    border:1px solid #000;
    border-radius:50%;
    background:none;
    font-size:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
    font-weight:bold;
}

.card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #ddd;
}

.left{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.name{
    font-size:18px;
}

.meta{
    font-size:13px;
    color:#666;
}

.amount{
    font-size:18px;
    font-weight:bold;
}

.btns button{
    margin-left:6px;
    padding:4px 8px;
    font-size:12px;
    border:1px solid #000;
    background:none;
    cursor:pointer;
    border-radius:4px;
}

.empty{
    text-align:center;
    margin-top:40px;
    color:#666;
    font-size:18px;
}

/* popup */
.popup{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.box{
    background:#fff;
    padding:15px;
    width:90%;
    max-width:320px;
    border-radius:8px;
}

.box input, .box select{
    width:100%;
    padding:8px;
    margin:8px 0;
}

.box button{
    width:100%;
    padding:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <button class="back-btn" onclick="window.location.href='index.html'">&larr;</button>
    <div class="title">Credits</div>
</div>

<div id="list"></div>
<div id="empty" class="empty" style="display:none;">No credits</div>

<!-- EDIT POPUP -->
<div class="popup" id="popup">
    <div class="box">
        <input id="amt" type="number" placeholder="Amount">
        <select id="mode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
        </select>
        <input id="note" type="text" placeholder="Note">
        <button onclick="saveEdit()">Save</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, push }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2DkTGi6VnGxBU5vcmhdvSpeWZskVknqc",
  authDomain: "site-2a9d6.firebaseapp.com",
  databaseURL: "https://site-2a9d6-default-rtdb.firebaseio.com",
  projectId: "site-2a9d6",
  storageBucket: "site-2a9d6.firebasestorage.app",
  messagingSenderId: "1060812483121",
  appId: "1:1060812483121:web:d2b173d180071145810310"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");
const empty = document.getElementById("empty");

let editData = null;

// READ ALL INCOMES AND FILTER CREDIT
const incomeRef = ref(db, "incomes");

onValue(incomeRef, (snap) => {

    list.innerHTML = "";

    let credits = [];

    snap.forEach(daySnap => {
        const date = daySnap.key;

        daySnap.forEach(child => {
            const d = child.val();

            if(d.method === "Credit") {
                credits.push({
                    id: child.key,
                    date,
                    ...d
                });
            }
        });
    });

    if(credits.length === 0){
        empty.style.display = "block";
        return;
    } else {
        empty.style.display = "none";
    }

    credits.sort((a,b)=> new Date(a.date) - new Date(b.date));

    credits.forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="left">
                <div class="name">${item.note || "Credit"}</div>
                <div class="meta">${item.date}</div>
            </div>

            <div>
                <div class="amount">₹${item.amount}</div>
                <div class="btns">
                    <button onclick="editItem('${item.date}','${item.id}',${item.amount},'${item.note || ""}')">Edit</button>
                    <button onclick="deleteItem('${item.date}','${item.id}')">Delete</button>
                </div>
            </div>
        `;

        list.appendChild(div);
    });
});

// DELETE
window.deleteItem = async (date,id)=>{
    await remove(ref(db,"incomes/"+date+"/"+id));
};

// EDIT
window.editItem = (date,id,amount,note)=>{
    editData = {date,id};

    document.getElementById("amt").value = amount;
    document.getElementById("note").value = note || "";
    document.getElementById("mode").value = "Cash";

    document.getElementById("popup").style.display="flex";
};

// SAVE → MOVE TO CASH / UPI INCOME
window.saveEdit = async ()=>{

    const amount = Number(document.getElementById("amt").value);
    const mode = document.getElementById("mode").value;
    const note = document.getElementById("note").value;

    await push(ref(db,"incomes/"+editData.date),{
        method: mode,
        amount: amount,
        note: note
    });

    await remove(ref(db,"incomes/"+editData.date+"/"+editData.id));

    document.getElementById("popup").style.display="none";
};

</script>

</body>
</html>
