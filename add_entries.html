<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Entry</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

/* NAVBAR */

.navbar{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#673ab7;
    position:sticky;
    top:0;
    z-index:1000;
    padding:0 10px;
}

.back-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#673ab7;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.nav-title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    font-weight:bold;
    color:#fff;
}

/* BUTTON AREA */

.type-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:80px;
    padding:0 20px;
}

/* ENTRY BUTTONS */

.type-btn{
    width:160px;
    height:70px;
    border:none;
    border-radius:35px;
    background:#673ab7;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.type-btn:active{
    transform:scale(.97);
}

</style>
</head>
<body>

<div class="navbar">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="nav-title">Add Entry</div>
</div>

<div class="type-buttons">
    <button class="type-btn" onclick="window.location.href='Income.html'">Income</button>
    <button class="type-btn" onclick="window.location.href='Expences.html'">Expense</button>
</div>

</body>
</html>
